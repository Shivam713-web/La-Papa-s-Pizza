<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Papa's Pizza | QR Code Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        // Apply theme early to prevent screen flash
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    <style>
        :root {
            --primary: #ff4d00;
            --primary-dark: #e04400;
            --bg-dark: #0d0d0d;
            --bg-card: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --border-color: rgba(255,255,255,0.08);
            --radius-md: 12px;
            --radius-lg: 20px;
            --btn-secondary-bg: rgba(255,255,255,0.05);
            --btn-secondary-hover-bg: rgba(255,255,255,0.1);
        }

        [data-theme="light"] {
            --bg-dark: #f8f9fa;
            --bg-card: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #495057;
            --border-color: rgba(0,0,0,0.08);
            --btn-secondary-bg: rgba(0,0,0,0.05);
            --btn-secondary-hover-bg: rgba(0,0,0,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            padding: 40px 20px;
            min-height: 100vh;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        h1 span {
            color: var(--primary);
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .actions-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 16px 24px;
            border-radius: var(--radius-md);
            margin-bottom: 30px;
        }

        .btn {
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--btn-secondary-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--btn-secondary-hover-bg);
        }

        .qr-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 24px;
        }

        .qr-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 24px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .table-num {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
        }

        .qr-image-container {
            background: white;
            padding: 12px;
            border-radius: var(--radius-md);
            width: 174px;
            height: 174px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qr-image-container img {
            width: 150px;
            height: 150px;
        }

        .url-box {
            font-size: 0.7rem;
            color: var(--text-secondary);
            background: rgba(0,0,0,0.3);
            padding: 6px 12px;
            border-radius: 6px;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .qr-card-footer {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .qr-card-footer .btn {
            flex: 1;
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: 8px;
            justify-content: center;
        }

        /* Print styles */
        @media print {
            body {
                background: white;
                color: black;
                padding: 0;
            }
            .actions-bar, header, .qr-card-footer, .url-box {
                display: none !important;
            }
            .qr-grid {
                display: block;
            }
            .qr-card {
                page-break-inside: avoid;
                border: 2px solid #000;
                background: white;
                color: black;
                margin-bottom: 30px;
                padding: 20px;
                width: 250px;
                display: inline-flex;
                margin-right: 20px;
                box-shadow: none;
            }
            .table-num {
                color: #000;
                font-size: 1.5rem;
            }
            .qr-image-container {
                border: 1px solid #ccc;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>La Papa's Pizza | <span>Table QR Codes</span></h1>
            <p class="subtitle">Generate and print QR codes for active restaurant tables (Table 1 to 10)</p>
        </header>

        <div class="actions-bar">
            <a href="dashboard.html" class="btn btn-secondary"><i class="fas fa-chart-line"></i> Go to Orders Dashboard</a>
            <button class="btn btn-secondary btn-icon-only" id="themeToggle" aria-label="Toggle Theme" style="border-radius: 50%; width: 38px; height: 38px; display: inline-flex; align-items: center; justify-content: center; padding: 0;">
                <i class="fas fa-moon"></i>
            </button>
            <button class="btn" onclick="window.print()"><i class="fas fa-print"></i> Print All QR Codes</button>
        </div>

        <div class="qr-grid" id="qrGrid">
            <!-- Cards generated dynamically -->
        </div>
    </div>

    <script>
        const totalTables = 10;
        const qrGrid = document.getElementById('qrGrid');
        
        // Use current site root path as base
        const currentUrl = window.location.href;
        const baseUrl = currentUrl.substring(0, currentUrl.lastIndexOf('/')) + '/index.html';

        for (let t = 1; t <= totalTables; t++) {
            const tableUrl = `${baseUrl}?table=${t}`;
            const qrCodeApi = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(tableUrl)}`;
            
            const card = document.createElement('div');
            card.className = 'qr-card';
            card.innerHTML = `
                <div class="table-num">Table ${t}</div>
                <div class="qr-image-container">
                    <img src="${qrCodeApi}" alt="QR Code for Table ${t}">
                </div>
                <div class="url-box">${tableUrl}</div>
                <div class="qr-card-footer">
                    <a href="${tableUrl}" target="_blank" class="btn btn-secondary"><i class="fas fa-external-link-alt"></i> Book</a>
                </div>
            `;
            qrGrid.appendChild(card);
        }

        // Theme Toggle Logic
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i');

        function updateThemeIcon() {
            const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
            if (themeIcon) {
                if (currentTheme === 'light') {
                    themeIcon.className = 'fas fa-sun';
                } else {
                    themeIcon.className = 'fas fa-moon';
                }
            }
        }

        updateThemeIcon();

        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
            const nextTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            document.documentElement.setAttribute('data-theme', nextTheme);
            localStorage.setItem('theme', nextTheme);
            updateThemeIcon();
        });
    </script>
</body>
</html>
